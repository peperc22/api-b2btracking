
services:
  app:
    container_name: dev-b2btrackingapi
    build:
      context: .
      target: development
    ports:
      - "3000:3000"
    environment:
      AWS_REGION: "us-east-1"
    restart: always
    volumes:
      - ~/.aws:/root/.aws:ro
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    #env_file: .env

